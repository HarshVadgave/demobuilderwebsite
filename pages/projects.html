<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Projects | Demo Builders</title>
<meta name="description" content="Explore our portfolio of premium residential, commercial and infrastructure projects across Pune, Mumbai and the greater Konkan belt.">
<meta property="og:title" content="Projects | Demo Builders"><meta property="og:type" content="website">
<link rel="canonical" href="projects.html">
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/styles.css">
</head>
<body data-page="projects" class="solid-nav">
<div data-include="preloader"></div>
<a href="#main" class="skip-link">Skip to content</a>
<div data-include="nav"></div>

<main id="main">

<section class="subhead">
  <div class="container">
    <nav class="breadcrumb"><a href="index.html">Home</a><span class="sep">/</span><span>Projects</span></nav>
    <div class="eyebrow">Our Portfolio</div>
    <h1>Landmark projects across every scale.</h1>
    <p>From luxury villas to mixed-use townships and Grade-A office parks — a curated selection of what we've built and what we're building next.</p>
  </div>
</section>

<section class="section-pad">
  <div class="container">
    <div class="gallery-filters reveal" role="tablist" aria-label="Project status filters">
      <button class="gfilter active" data-status="all">All Projects</button>
      <button class="gfilter" data-status="completed">Completed</button>
      <button class="gfilter" data-status="ongoing">Ongoing</button>
      <button class="gfilter" data-status="upcoming">Upcoming</button>
    </div>
    <div class="projects-grid reveal" id="allProjects"></div>
  </div>
</section>

</main>

<div data-include="footer"></div>
<div data-include="fabs"></div>
<script src="../assets/data.js"></script>
<script src="../assets/main.js"></script>
<script>
(function(){
  const grid = document.getElementById('allProjects');
  function render(list){
    grid.innerHTML = list.map((p,i)=>`
      <div class="project-card" style="--i:${i%6}">
        <div class="project-img">
          <span class="status-pill ${p.status}">${p.status}</span>
          <span class="type-pill">${p.type}</span>
          <img loading="lazy" src="${p.hero}" alt="${p.name}">
        </div>
        <div class="project-body">
          <div class="project-loc"><svg viewBox="0 0 24 24" fill="none" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>${p.location}</div>
          <h3>${p.name}</h3>
          <p>${p.short}</p>
          <div class="project-meta">
            <span><strong>${p.area}</strong>Area</span>
            <span><strong>${p.year}</strong>Completion</span>
            <span><strong>${p.value}</strong>Value</span>
          </div>
          <div class="project-foot">
            <div class="project-value">${p.price}<span>Starting</span></div>
            <a href="project-details.html?id=${p.id}" class="view-link">View Details <svg viewBox="0 0 24 24" fill="none" stroke-width="2.4" stroke="currentColor"><path d="M5 12h14M13 6l6 6-6 6"/></svg></a>
          </div>
        </div>
      </div>`).join('');
  }
  render(DEMO_PROJECTS);
  document.querySelectorAll('.gfilter').forEach(b => b.addEventListener('click', () => {
    document.querySelectorAll('.gfilter').forEach(x => x.classList.remove('active'));
    b.classList.add('active');
    const s = b.dataset.status;
    render(s === 'all' ? DEMO_PROJECTS : DEMO_PROJECTS.filter(p => p.status === s));
  }));
})();
</script>
</body>
</html>
